<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clases | Mentorix</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/styles/clases.css" />
    <link rel="stylesheet" href="/styles/shared-ui.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div data-component="navbar"></div>
    <main class="container clases-page py-4 py-lg-5 flex-grow-1">
      <section class="clases-hero mb-4">
        <div class="d-flex flex-column flex-lg-row align-items-lg-end justify-content-between gap-4">
          <div>
            <p id="clases-eyebrow" class="text-uppercase small fw-bold text-secondary mb-2">Explorá Mentorix</p>
            <h1 id="clases-title" class="display-title mb-2">Clases disponibles</h1>
            <p id="clases-subtitle" class="text-muted mb-0">Mentorías publicadas por la comunidad.</p>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-outline-dark rounded-pill px-4 d-inline-flex align-items-center gap-2" href="/pages/dashboard.html" data-back-link>
              <i class="bi bi-arrow-left"></i>Volver
            </a>
            <a id="btn-crear-clase" class="btn btn-dark rounded-pill px-4 d-none" href="/pages/crear-clase.html">
              <i class="bi bi-plus-lg me-1"></i>Crear clase
            </a>
          </div>
        </div>

        <div class="clases-toolbar mt-4">
          <div class="search-shell">
            <i class="bi bi-search"></i>
            <input id="q" type="text" class="form-control" placeholder="Buscar por título, descripción o mentor" />
          </div>

          <div class="filter-chips" aria-label="Filtros de modalidad">
            <button class="filter-chip is-active" type="button" data-filter="todas">Todas</button>
            <button class="filter-chip" type="button" data-filter="virtual">Virtual</button>
            <button class="filter-chip" type="button" data-filter="presencial">Presencial</button>
          </div>

          <div class="clases-count" id="clases-count"></div>
        </div>

        <div class="advanced-filters mt-3">
          <select id="filter-materia" class="form-select" aria-label="Filtrar por materia">
            <option value="">Todas las materias</option>
          </select>
          <select id="filter-nivel" class="form-select" aria-label="Filtrar por nivel educativo">
            <option value="">Todos los niveles</option>
            <option value="primaria">Primaria</option>
            <option value="secundaria">Secundaria</option>
            <option value="terciario">Terciario</option>
            <option value="universitario">Universitario</option>
            <option value="posgrado">Posgrado</option>
            <option value="adultos">Adultos</option>
          </select>
          <input id="filter-precio" class="form-control" type="number" min="0" step="100" placeholder="Precio máximo" />
          <input id="filter-fecha" class="form-control" type="date" aria-label="Filtrar por día" />
          <select id="filter-horario" class="form-select" aria-label="Filtrar por horario">
            <option value="">Cualquier horario</option>
            <option value="manana">Mañana</option>
            <option value="tarde">Tarde</option>
            <option value="noche">Noche</option>
          </select>
          <select id="filter-valoracion" class="form-select" aria-label="Filtrar por valoración">
            <option value="">Cualquier valoración</option>
            <option value="4">4+ estrellas</option>
            <option value="3">3+ estrellas</option>
            <option value="2">2+ estrellas</option>
          </select>
        </div>
      </section>

      <div id="clases-error" class="alert alert-danger d-none" role="alert"></div>
      <div id="clases-list"></div>
    </main>
    <div id="footer"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/clases.js"></script>
  </body>
</html>
