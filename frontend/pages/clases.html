<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clases | Mentorix</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
      <link rel="stylesheet" href="/styles/clases.css" />
    <link rel="stylesheet" href="/styles/shared-ui.css" />
</head>
  <body class="d-flex flex-column min-vh-100">
    <div data-component="navbar"></div>
    <main class="container py-4 py-lg-5 flex-grow-1">
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-4">
        <div>
          <p class="text-uppercase small fw-bold text-secondary mb-2">Explorá Mentorix</p>
          <h1 class="h3 fw-bold mb-1">Clases disponibles</h1>
          <div class="text-muted">Mentorías publicadas por la comunidad.</div>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <a id="btn-crear-clase" class="btn btn-dark rounded-pill px-4 d-none" href="/pages/crear-clase.html">Crear clase</a>
        </div>
      </div>

      <div class="card panel-card mb-4">
        <div class="card-body p-4">
          <label for="q" class="form-label fw-semibold mb-2">Buscar clase</label>
          <input id="q" type="text" class="form-control form-control-lg" placeholder="Filtrar por título, descripción o mentor" />
        </div>
      </div>

      <div id="clases-error" class="alert alert-danger d-none" role="alert"></div>
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="text-muted small" id="clases-count"></div>
      </div>
      <div id="clases-list"></div>
    </main>
    <div id="footer"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/clases.js"></script>
  </body>
</html>
