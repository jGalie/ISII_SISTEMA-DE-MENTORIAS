<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Mentorix</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/styles/auth-login.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header class="topbar border-bottom border-white border-opacity-75 sticky-top">
      <nav class="navbar navbar-expand-lg">
        <div class="container py-2">
          <a class="topbar-brand fw-bold d-flex align-items-center gap-2" href="../index.html">
            <span class="brand-mark"><i class="bi bi-mortarboard-fill fs-5"></i></span>
            <span class="fs-4">Mentorix</span>
          </a>
          <div class="ms-auto">
            <a class="btn btn-outline-dark rounded-pill px-4" href="../index.html">
              <i class="bi bi-arrow-left-short me-1"></i>Volver al inicio
            </a>
          </div>
        </div>
      </nav>
    </header>

    <main class="container login-shell d-flex flex-column align-items-center justify-content-center py-5 flex-grow-1">
      <div class="brand-block mb-4 mb-lg-5">
        <div class="brand-mark mb-3 mx-auto">
          <i class="bi bi-mortarboard-fill fs-4"></i>
        </div>
        <h1 class="brand-name mb-2">Mentorix</h1>
        <p class="brand-subtitle mb-0">Tu plataforma de aprendizaje</p>
      </div>

      <section class="card login-card">
        <div class="card-body p-4 p-lg-5">
          <div class="panel-title mb-4">Iniciar Sesión</div>

          <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

          <form id="login-form" novalidate>
            <div class="mb-4">
              <label for="email" class="form-label">Correo electrónico</label>
              <div class="input-shell">
                <i class="bi bi-envelope"></i>
                <input
                  id="email"
                  type="email"
                  class="form-control"
                  placeholder="tu@email.com"
                  autocomplete="username"
                  required
                />
              </div>
              <div id="email-error" class="invalid-feedback d-none">Ingresa un email valido.</div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <div class="input-shell">
                <i class="bi bi-lock"></i>
                <input
                  id="password"
                  type="password"
                  class="form-control"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required
                />
                <button
                  id="toggle-password"
                  class="password-toggle"
                  type="button"
                  aria-label="Mostrar contraseña"
                  aria-pressed="false"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div id="password-error" class="invalid-feedback d-none">Ingresa tu contrasena.</div>
            </div>

            <div class="text-end mb-4">
              <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <button id="btn-login" class="btn btn-login w-100" type="submit">Iniciar Sesión</button>
          </form>

          <p class="text-center text-muted mb-0 mt-4">
            ¿No tienes cuenta? <a class="register-link" href="/pages/register.html">Regístrate aquí</a>
          </p>
        </div>
      </section>
    </main>
    <div id="footer"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/login.js"></script>
  </body>
</html>
