
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crear clase | Mentorix </title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
      <link rel="stylesheet" href="/styles/crear-clase.css" />
    <link rel="stylesheet" href="/styles/shared-ui.css" />
</head>
  <body>
    <div data-component="navbar"></div>
    <main class="container py-4 py-lg-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="page-card card">
            <div class="card-body p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
                <div>
                  <p class="text-uppercase small fw-bold text-secondary mb-2">Gestión de clases</p>
                  <h1 id="page-title" class="h3 fw-bold mb-1">Crear clase</h1>
                  <p class="text-muted mb-0">Publicá una nueva mentoría con el estilo Mentorix.</p>
                </div>
                <a class="btn btn-outline-dark rounded-pill px-4" href="/pages/clases.html">Volver</a>
              </div>

              <div id="form-msg" class="alert d-none" role="status"></div>

              <form id="form-clase" novalidate>
                <div class="mb-4">
                  <label class="form-label fw-semibold" for="titulo">Título</label>
                  <div class="input-shell">
                    <i class="bi bi-book me-2"></i>
                    <input class="form-control" type="text" id="titulo" name="titulo" required maxlength="100" placeholder="Ej. Introducción a Node.js" />
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold" for="descripcion">Descripción</label>
                  <div class="textarea-shell">
                    <textarea class="form-control" id="descripcion" name="descripcion" rows="5" required placeholder="Contá qué van a aprender en esta clase."></textarea>
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold" for="fecha">Fecha y hora</label>
                  <div class="input-shell">
                    <i class="bi bi-calendar-event me-2"></i>
                    <input class="form-control" type="datetime-local" id="fecha" name="fecha" required />
                  </div>
                </div>

                <div class="mb-4">
                  <label class="form-label fw-semibold" for="modalidad">Modalidad</label>
                  <div class="input-shell">
                    <i class="bi bi-laptop me-2"></i>
                    <select class="form-select" id="modalidad" name="modalidad" required>
                      <option value="virtual">Virtual</option>
                      <option value="presencial">Presencial</option>
                    </select>
                  </div>
                </div>

                <div class="d-flex gap-3 flex-wrap">
                  <button id="btn-guardar" class="btn btn-brand px-4" type="submit">Crear clase</button>
                  <button id="btn-delete" class="btn btn-outline-danger rounded-pill px-4 d-none" type="button">Eliminar clase</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/crear-clase.js"></script>
  </body>
</html>
