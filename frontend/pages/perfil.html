<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mi perfil | Mentorix</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/styles/profile.css" />
    <link rel="stylesheet" href="/styles/shared-ui.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <div data-component="navbar"></div>
    <main class="container py-4 py-lg-5 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-9">
          <div class="page-card card">
            <div class="card-body p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-start gap-3 mb-4 flex-wrap">
                <div>
                  <p class="text-uppercase small fw-bold text-secondary mb-2">Mi cuenta</p>
                  <h1 class="h3 fw-bold mb-1">Editar perfil</h1>
                  <p id="profile-subtitle" class="text-muted mb-0">Actualiza tu informacion personal.</p>
                </div>
                <a class="btn btn-outline-dark rounded-pill px-4" href="/pages/dashboard.html">Volver</a>
              </div>

              <div id="profile-msg" class="alert d-none" role="status"></div>

              <form id="profile-form" novalidate>
                <div class="row g-4">
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold" for="profile-nombre">Nombre</label>
                    <div class="input-shell">
                      <i class="bi bi-person me-2"></i>
                      <input class="form-control" type="text" id="profile-nombre" maxlength="120" required />
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold" for="profile-email">Correo electronico</label>
                    <div class="input-shell">
                      <i class="bi bi-envelope me-2"></i>
                      <input class="form-control" type="email" id="profile-email" required />
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold" for="profile-ubicacion">Ubicacion</label>
                    <div class="input-shell">
                      <i class="bi bi-geo-alt me-2"></i>
                      <input class="form-control" type="text" id="profile-ubicacion" maxlength="120" placeholder="Ciudad, Pais" />
                    </div>
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold" for="profile-telefono">Telefono <span class="text-muted fw-normal">(opcional)</span></label>
                    <div class="input-shell">
                      <i class="bi bi-telephone me-2"></i>
                      <input class="form-control" type="text" id="profile-telefono" maxlength="40" />
                    </div>
                  </div>
                </div>

                <div id="mentor-profile-fields" class="d-none mt-4">
                  <div class="mentor-panel mb-4">
                    <div class="fw-semibold mb-3">Perfil profesional</div>
                    <div class="row g-4">
                      <div class="col-12">
                        <label class="form-label fw-semibold" for="profile-mentor-bio">Presentacion</label>
                        <div class="textarea-shell">
                          <textarea
                            id="profile-mentor-bio"
                            class="form-control"
                            rows="4"
                            maxlength="800"
                            placeholder="Conta brevemente tu enfoque como mentor, experiencia academica y forma de trabajo."
                          ></textarea>
                        </div>
                      </div>
                      <div class="col-12 col-md-6">
                        <label class="form-label fw-semibold" for="profile-mentor-experiencia">Experiencia</label>
                        <div class="input-shell">
                          <i class="bi bi-award me-2"></i>
                          <input
                            class="form-control"
                            type="text"
                            id="profile-mentor-experiencia"
                            maxlength="120"
                            placeholder="Ej. 5 anos dictando clases"
                          />
                        </div>
                      </div>
                      <div class="col-12 col-md-6">
                        <label class="form-label fw-semibold" for="profile-mentor-link">Enlace profesional</label>
                        <div class="input-shell">
                          <i class="bi bi-link-45deg me-2"></i>
                          <input
                            class="form-control"
                            type="url"
                            id="profile-mentor-link"
                            maxlength="255"
                            placeholder="LinkedIn, portfolio o sitio personal"
                          />
                        </div>
                      </div>
                    </div>
                  </div>

                  <div class="mentor-panel mb-4">
                    <div class="fw-semibold mb-3">Materias que dictas</div>
                    <div id="profile-materias-container" class="chips-grid"></div>
                    <div class="mt-3">
                      <label for="profile-otras-materias" class="form-label small">Otras materias</label>
                      <div class="textarea-shell">
                        <textarea id="profile-otras-materias" class="form-control" rows="3" placeholder="Escribe una o varias materias separadas por coma."></textarea>
                      </div>
                    </div>
                  </div>

                  <div class="mentor-panel">
                    <div class="fw-semibold mb-3">Niveles educativos</div>
                    <div class="chips-grid">
                      <label class="chip-option"><input type="checkbox" name="profile-nivel" value="primaria" /><span>Primaria</span></label>
                      <label class="chip-option"><input type="checkbox" name="profile-nivel" value="secundaria" /><span>Secundaria</span></label>
                      <label class="chip-option"><input type="checkbox" name="profile-nivel" value="terciario" /><span>Terciario</span></label>
                      <label class="chip-option"><input type="checkbox" name="profile-nivel" value="universitario" /><span>Universitario</span></label>
                      <label class="chip-option"><input type="checkbox" name="profile-nivel" value="posgrado" /><span>Posgrado</span></label>
                      <label class="chip-option"><input type="checkbox" name="profile-nivel" value="adultos" /><span>Adultos</span></label>
                    </div>
                  </div>
                </div>

                <section class="security-panel mt-4">
                  <div class="mb-3">
                    <h2 class="h5 fw-bold mb-1">Seguridad</h2>
                    <p class="text-muted mb-0">Completa estos campos solo si quieres cambiar tu contrasena.</p>
                  </div>

                  <div class="row g-4">
                    <div class="col-12 col-md-4">
                      <label class="form-label fw-semibold" for="profile-current-password">Contrasena actual</label>
                      <div class="input-shell">
                        <i class="bi bi-lock me-2"></i>
                        <input class="form-control" type="password" id="profile-current-password" autocomplete="current-password" />
                      </div>
                    </div>
                    <div class="col-12 col-md-4">
                      <label class="form-label fw-semibold" for="profile-new-password">Nueva contrasena</label>
                      <div class="input-shell">
                        <i class="bi bi-shield-lock me-2"></i>
                        <input class="form-control" type="password" id="profile-new-password" autocomplete="new-password" />
                      </div>
                      <div class="form-text">Minimo 8 caracteres, con letras y numeros.</div>
                    </div>
                    <div class="col-12 col-md-4">
                      <label class="form-label fw-semibold" for="profile-confirm-password">Confirmar contrasena</label>
                      <div class="input-shell">
                        <i class="bi bi-check2-circle me-2"></i>
                        <input class="form-control" type="password" id="profile-confirm-password" autocomplete="new-password" />
                      </div>
                    </div>
                  </div>
                </section>

                <div class="mt-4 d-flex gap-3 flex-wrap">
                  <button id="btn-save-profile" class="btn btn-brand px-4" type="submit">Guardar cambios</button>
                  <a class="btn btn-outline-dark rounded-pill px-4 d-inline-flex align-items-center" href="/pages/dashboard.html">Cancelar</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="footer"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/perfil.js"></script>
  </body>
</html>
