<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inicio estudiante | Mentorix</title>
    <meta
      name="description"
      content="Explorá clases y mentorías online con profesores destacados en distintas materias."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/styles/landing.css" />
    <link rel="stylesheet" href="/styles/shared-ui.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header class="sticky-top">
      <nav class="navbar navbar-expand-lg border-bottom border-white border-opacity-75">
        <div class="container py-2">
          <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/pages/inicio-estudiante.html">
            <span class="brand-mark"><i class="bi bi-mortarboard-fill"></i></span>
            <span>Mentorix</span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
            aria-controls="mainNavbar"
            aria-expanded="false"
            aria-label="Abrir navegación"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainNavbar">
            <div class="ms-auto d-flex flex-column flex-lg-row align-items-lg-center gap-2 gap-lg-3 pt-3 pt-lg-0">
              <a class="btn btn-soft" href="/pages/inicio-estudiante.html">Clases</a>
              <a class="btn btn-soft" href="/pages/dashboard.html">Mis inscripciones</a>
              <div class="dropdown">
                <button
                  class="btn btn-brand px-4 py-2 dropdown-toggle d-inline-flex align-items-center gap-2"
                  id="student-menu"
                  type="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  <i class="bi bi-person-badge"></i>
                  <span id="student-menu-name">Estudiante</span>
                  <span class="role-pill">Estudiante</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="student-menu">
                  <li><h6 id="student-menu-email" class="dropdown-header">Sesión estudiante</h6></li>
                  <li>
                    <a class="dropdown-item" href="/pages/perfil.html">
                      <i class="bi bi-person-gear me-2"></i>Modificar perfil
                    </a>
                  </li>
                  <li><hr class="dropdown-divider" /></li>
                  <li>
                    <button id="student-logout" class="dropdown-item" type="button">
                      <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                    </button>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <main class="flex-grow-1">
      <section class="hero-section py-5">
        <div class="container py-4 py-lg-5">
          <div class="text-center">
            <h1 class="hero-title fw-bold mb-4">Encontrá tu profesor ideal</h1>
            <p id="student-home-welcome" class="hero-subtitle lead mx-auto mb-4">
              Explorá clases disponibles y solicitá tu inscripción. El mentor la revisará antes de aprobarla.
            </p>

            <form id="search-form" class="hero-search mx-auto mb-4">
              <div class="row g-2 align-items-center">
                <div class="col-12 col-md d-flex align-items-center">
                  <span class="search-icon"><i class="bi bi-search"></i></span>
                  <input
                    id="search-input"
                    type="search"
                    class="form-control form-control-lg"
                    placeholder="Probá 'Matemática', 'Inglés', 'Programación'..."
                    aria-label="Buscar clases"
                  />
                </div>
                <div class="col-12 col-md-auto">
                  <button class="btn btn-brand btn-lg w-100 px-5" type="submit">Buscar</button>
                </div>
              </div>
            </form>

            <div class="modality-filter mx-auto mb-4" aria-label="Filtrar por modalidad">
              <button class="modality-chip is-active" type="button" data-modalidad="">Todas</button>
              <button class="modality-chip" type="button" data-modalidad="virtual">Virtual</button>
              <button class="modality-chip" type="button" data-modalidad="presencial">Presencial</button>
            </div>

            <p class="explore-copy mb-4">O explorá por materia</p>

            <div class="subjects-track-shell">
              <button class="subject-nav prev" type="button" id="subjects-prev" aria-label="Ver materias anteriores">
                <i class="bi bi-chevron-left"></i>
              </button>
              <div id="subjects-track" class="subjects-track" aria-label="Materias destacadas"></div>
              <button class="subject-nav next" type="button" id="subjects-next" aria-label="Ver más materias">
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="teachers-section py-5">
        <div class="container">
          <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-2 mb-4">
            <div>
              <p class="section-kicker mb-2">Clases disponibles</p>
              <h2 class="h3 mb-0">Elegí tu próxima clase</h2>
            </div>
            <p id="results-count" class="text-muted mb-0">Cargando clases...</p>
          </div>

          <div id="error-alert" class="alert alert-danger d-none" role="alert"></div>

          <div id="teachers-grid" class="row g-4"></div>
        </div>
      </section>
    </main>
    <div id="footer"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/inicio-estudiante.js"></script>
    <script src="/index.js"></script>
  </body>
</html>
