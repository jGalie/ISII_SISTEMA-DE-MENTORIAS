<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Detalle de clase | Mentorix</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/styles/detalle-clase.css" />
    <link rel="stylesheet" href="/styles/shared-ui.css" />
</head>
  <body class="d-flex flex-column min-vh-100">
    <div data-component="navbar"></div>
    <main class="container py-4 py-lg-5 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="d-flex align-items-center justify-content-between mb-3">
            <div>
              <p class="text-uppercase small fw-bold text-secondary mb-2">Detalle Mentorix</p>
              <h1 class="h3 fw-bold mb-0">Detalle de clase</h1>
            </div>
            <a class="btn btn-outline-dark rounded-pill px-4 d-inline-flex align-items-center gap-2" href="/pages/clases.html" data-back-link>
              <i class="bi bi-arrow-left"></i>Volver
            </a>
          </div>

          <div id="detalle-error" class="alert alert-danger d-none" role="alert"></div>
          <div id="detalle-success" class="alert alert-success d-none" role="status"></div>

          <div id="detalle-content" class="card detail-card d-none">
            <div class="card-body p-4 p-lg-5">
              <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-4">
                <div>
                  <h2 id="dc-titulo" class="display-6 fw-bold mb-2"></h2>
                  <p id="dc-mentor" class="text-muted mb-0"></p>
                </div>
                <span id="dc-fecha" class="badge rounded-pill text-bg-light border fs-6"></span>
              </div>
              <p id="dc-desc" class="text-muted lead mb-4"></p>
              <div class="row g-3 small">
                <div class="col-12 col-md-6">
                  <div class="text-muted">ID de clase</div>
                  <div id="dc-id" class="fw-semibold"></div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="text-muted">Email del mentor</div>
                  <div id="dc-email" class="fw-semibold"></div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="text-muted">Materia</div>
                  <div id="dc-materia" class="fw-semibold"></div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="text-muted">Modalidad</div>
                  <div id="dc-modalidad" class="fw-semibold"></div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="text-muted">Precio</div>
                  <div id="dc-precio" class="fw-semibold"></div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="text-muted">Cupos</div>
                  <div id="dc-cupos" class="fw-semibold"></div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="text-muted">Valoracion</div>
                  <div id="dc-rating" class="fw-semibold"></div>
                </div>
                <div class="col-12 col-md-6">
                  <div class="text-muted">Ubicacion</div>
                  <div id="dc-ubicacion" class="fw-semibold"></div>
                </div>
              </div>
              <div class="mt-4">
                <a id="dc-edit" class="btn btn-dark rounded-pill px-4 d-none" href="#">Editar clase</a>
                <button id="dc-enroll" class="btn btn-dark rounded-pill px-4 d-none" type="button">Inscribirse</button>
                <a id="dc-dashboard" class="btn btn-outline-dark rounded-pill px-4 d-none" href="/pages/dashboard.html">Ver mis inscripciones</a>
              </div>
            </div>
          </div>

          <section id="review-section" class="card detail-card mt-4 d-none">
            <div class="card-body p-4">
              <h2 class="h5 fw-bold mb-3">Valoraciones</h2>
              <div id="reviews-list" class="d-grid gap-3 mb-4"></div>
              <form id="review-form" class="d-none" novalidate>
                <div class="row g-3">
                  <div class="col-12 col-md-4">
                    <label class="form-label fw-semibold" for="review-stars">Estrellas</label>
                    <select id="review-stars" class="form-select" required>
                      <option value="5">5 estrellas</option>
                      <option value="4">4 estrellas</option>
                      <option value="3">3 estrellas</option>
                      <option value="2">2 estrellas</option>
                      <option value="1">1 estrella</option>
                    </select>
                  </div>
                  <div class="col-12 col-md-8">
                    <label class="form-label fw-semibold" for="review-comment">Comentario</label>
                    <textarea id="review-comment" class="form-control" rows="3" maxlength="500" placeholder="Conta brevemente como fue tu experiencia."></textarea>
                  </div>
                </div>
                <button id="review-submit" class="btn btn-dark rounded-pill px-4 mt-3" type="submit">Enviar valoracion</button>
              </form>
            </div>
          </section>
        </div>
      </div>
    </main>
    <div id="footer"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/pages/detalle-clase.js"></script>
  </body>
</html>
