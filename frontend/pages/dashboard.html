<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | Mentorix</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
      <link rel="stylesheet" href="/styles/dashboard.css" />
</head>
  <body>
    <header class="topbar border-bottom border-white border-opacity-75 sticky-top">
      <nav class="navbar navbar-expand-lg">
        <div class="container py-2">
          <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/index.html">
            <span class="brand-mark"><i class="bi bi-mortarboard-fill fs-5"></i></span>
            <span class="fs-4 text-dark">Mentorix</span>
          </a>
          <div class="ms-auto d-flex align-items-center gap-2">
            <a class="btn btn-outline-dark pill-button px-4" href="/index.html">Inicio</a>
            <button id="logout-button" class="btn btn-dark pill-button px-4" type="button">Cerrar sesión</button>
          </div>
        </div>
      </nav>
    </header>

    <main class="container py-4 py-lg-5">
      <section class="hero-panel p-4 p-lg-5 mb-4">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-4">
          <div>
            <p class="text-uppercase small fw-bold text-secondary mb-2">Dashboard Mentorix</p>
            <h1 class="display-6 fw-bold mb-2">Tu espacio de mentorías</h1>
            <p id="welcome-text" class="text-muted mb-0">Cargando sesión...</p>
          </div>
          <div class="d-flex gap-3 flex-wrap align-self-start">
            <a class="btn btn-outline-dark pill-button px-4" href="/index.html">Ver clases</a>
          </div>
        </div>
      </section>

      <section class="row g-3 mb-4" id="metrics-row">
        <div class="col-12 col-md-4">
          <div class="metric-card p-3">
            <div class="text-muted small">Pendientes</div>
            <div id="metric-pendiente" class="fs-3 fw-bold">0</div>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="metric-card p-3">
            <div class="text-muted small">Aceptadas</div>
            <div id="metric-aceptada" class="fs-3 fw-bold">0</div>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="metric-card p-3">
            <div class="text-muted small">Rechazadas</div>
            <div id="metric-rechazada" class="fs-3 fw-bold">0</div>
          </div>
        </div>
      </section>

      <div id="dashboard-error" class="alert alert-danger d-none" role="alert"></div>

      <section id="student-dashboard" class="d-none">
        <div class="dashboard-card p-4 p-lg-5 mb-4">
          <h2 class="h4 fw-bold mb-4">Tus inscripciones</h2>
          <div class="row g-4">
            <div class="col-12 col-lg-4">
              <h3 class="h6 fw-bold mb-3">Pendientes</h3>
              <div id="pending-list" class="d-grid gap-3"></div>
            </div>
            <div class="col-12 col-lg-4">
              <h3 class="h6 fw-bold mb-3">Aceptadas</h3>
              <div id="accepted-list" class="d-grid gap-3"></div>
            </div>
            <div class="col-12 col-lg-4">
              <h3 class="h6 fw-bold mb-3">Rechazadas</h3>
              <div id="rejected-list" class="d-grid gap-3"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="mentor-dashboard" class="d-none">
        <div class="dashboard-card p-4 p-lg-5">
          <div class="d-flex justify-content-between align-items-center gap-3 mb-4 flex-wrap">
            <div>
              <h2 class="h4 fw-bold mb-1">Solicitudes para tus clases</h2>
              <p class="text-muted mb-0">Aceptá o rechazá inscripciones pendientes.</p>
            </div>
          </div>
          <div id="mentor-list" class="d-grid gap-3"></div>
        </div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/pages/dashboard.js"></script>
  </body>
</html>
