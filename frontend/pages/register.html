<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registro | Mentorix</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
      <link rel="stylesheet" href="/styles/auth-register.css" />
</head>
  <body>
    <header class="topbar border-bottom border-white border-opacity-75 sticky-top">
      <nav class="navbar navbar-expand-lg">
        <div class="container py-2">
          <a class="topbar-brand fw-bold d-flex align-items-center gap-2" href="/index.html">
            <span class="brand-mark"><i class="bi bi-mortarboard-fill fs-5"></i></span>
            <span class="fs-4">Mentorix</span>
          </a>
          <div class="ms-auto">
            <a class="btn btn-outline-dark rounded-pill px-4" href="/index.html">
              <i class="bi bi-arrow-left-short me-1"></i>Volver al inicio
            </a>
          </div>
        </div>
      </nav>
    </header>

    <main class="container register-shell d-flex flex-column align-items-center justify-content-center py-5">
      <div class="brand-block mb-4 mb-lg-5">
        <div class="brand-mark mb-3 mx-auto">
          <i class="bi bi-mortarboard-fill fs-4"></i>
        </div>
        <h1 class="brand-name mb-2">Mentorix</h1>
        <p class="brand-subtitle mb-0">Tu plataforma de aprendizaje</p>
      </div>

      <section class="card register-card">
        <div class="card-body p-4 p-lg-5">
          <div class="panel-title mb-4">Registrarse</div>

          <div id="register-alert" class="alert alert-danger d-none" role="alert"></div>
          <div id="register-ok" class="alert alert-success d-none" role="alert"></div>

          <form id="register-form" novalidate>
            <div class="mb-4">
              <label for="nombre" class="form-label">Nombre</label>
              <div class="input-shell">
                <i class="bi bi-person"></i>
                <input id="nombre" type="text" class="form-control" placeholder="Tu nombre completo" required maxlength="120" />
              </div>
            </div>

            <div class="mb-4">
              <label for="email" class="form-label">Correo electrónico</label>
              <div class="input-shell">
                <i class="bi bi-envelope"></i>
                <input id="email" type="email" class="form-control" placeholder="tu@email.com" required />
              </div>
              <div class="invalid-feedback d-block email-feedback" id="email-feedback">Ingresa un email válido.</div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Contraseña</label>
              <div class="input-shell">
                <i class="bi bi-lock"></i>
                <input id="password" type="password" class="form-control" placeholder="Crea una contraseña" required />
              </div>
              <div class="form-text">Mínimo 8 caracteres, con letras y números.</div>
            </div>

            <div class="checklist-card p-3 mb-4">
              <div class="fw-semibold small mb-2">Requisitos</div>
              <ul class="list-unstyled small m-0 d-grid gap-2">
                <li id="chk-len" class="check-item"><span class="status-icon">•</span><span>Longitud mínima (8)</span></li>
                <li id="chk-letter" class="check-item"><span class="status-icon">•</span><span>Contiene letras</span></li>
                <li id="chk-number" class="check-item"><span class="status-icon">•</span><span>Contiene números</span></li>
              </ul>
            </div>

            <div class="mb-4">
              <label for="rol" class="form-label">Rol</label>
              <div class="select-shell">
                <i class="bi bi-person-badge"></i>
                <select id="rol" class="form-select" required>
                  <option value="estudiante" selected>Estudiante</option>
                  <option value="mentor">Mentor</option>
                </select>
              </div>
            </div>

            <button id="btn-register" class="btn btn-register w-100" type="submit">Registrarme</button>
          </form>

          <p class="text-center text-muted mb-0 mt-4">
            ¿Ya tienes cuenta? <a class="login-link" href="/pages/login.html">Inicia sesión</a>
          </p>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/pages/register.js"></script>
  </body>
</html>
