<!--
  Fragmento reutilizable: formulario de acceso (sin autenticación real).
  Incrustar dentro de un <form> en la página o copiar campos según necesidad.
-->
<div class="form__row">
  <label class="form__label" for="email">Correo</label>
  <input class="form__input" type="email" id="email" name="email" autocomplete="username" placeholder="tu@correo.edu" />
</div>
<div class="form__row">
  <label class="form__label" for="password">Contraseña (demo)</label>
  <input class="form__input" type="password" id="password" name="password" autocomplete="current-password" placeholder="No se valida en el MVP" />
</div>
